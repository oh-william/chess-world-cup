<header class="app-header">
  <div class="brand">
    <svg class="logo" viewBox="0 0 24 24" aria-hidden="true"><use href="#i-trophy"></use></svg>
    <div>
      <h1 class="wordmark">Chess World Cup</h1>
      <div class="tagline">measuring the <em>language tax</em> — Elo lost purely to implementation</div>
    </div>
  </div>

  <nav class="tablist" role="tablist" aria-label="Primary views">
    <button class="tab" role="tab" data-view="tournament" id="tab-tournament"
      aria-selected="false" aria-controls="view-tournament" tabindex="0">
      <svg class="ico" aria-hidden="true"><use href="#i-trophy"></use></svg>Tournament</button>
    <button class="tab" role="tab" data-view="watch" id="tab-watch"
      aria-selected="false" aria-controls="view-watch" tabindex="-1">
      <svg class="ico" aria-hidden="true"><use href="#i-board"></use></svg>Watch</button>
    <button class="tab" role="tab" data-view="betting" id="tab-betting"
      aria-selected="false" aria-controls="view-betting" tabindex="-1">
      <svg class="ico" aria-hidden="true"><use href="#i-coin"></use></svg>Betting</button>
    <button class="tab" role="tab" data-view="analysis" id="tab-analysis"
      aria-selected="false" aria-controls="view-analysis" tabindex="-1">
      <svg class="ico" aria-hidden="true"><use href="#i-chart"></use></svg>Analysis</button>
    <button class="tab" role="tab" data-view="about" id="tab-about"
      aria-selected="false" aria-controls="view-about" tabindex="-1">
      <svg class="ico" aria-hidden="true"><use href="#i-flag-fallback"></use></svg>Engines</button>
  </nav>

  <div class="header-right">
    <span class="chip mode--replay" id="mode-chip" role="status" aria-live="polite">◦ REPLAY</span>
    <span id="wallet-chip"><!-- owned by betting.js --></span>
  </div>
</header>

<main class="app-main">
  <section id="view-tournament" class="view" role="tabpanel" aria-labelledby="tab-tournament"></section>
  <section id="view-watch" class="view" role="tabpanel" aria-labelledby="tab-watch"></section>
  <section id="view-betting" class="view" role="tabpanel" aria-labelledby="tab-betting"></section>
  <section id="view-analysis" class="view" role="tabpanel" aria-labelledby="tab-analysis"></section>
  <section id="view-about" class="view" role="tabpanel" aria-labelledby="tab-about"></section>
</main>

<div id="result-ticker" class="result-ticker" aria-live="off"><!-- populated by another stream --></div>

<footer class="app-footer">
  <span>libchess · UCI over stdin/stdout · one game at a time · warm-up before the clock</span>
</footer>

<div id="toast-host"></div>

<script src="js/core.js"></script>
<script src="js/board.js"></script>
<script src="js/charts.js"></script>
<script src="js/betting.js"></script>
<script src="js/tournament.js"></script>
<script src="js/watch.js"></script>
<script src="js/analysis.js"></script>
<script src="js/about.js"></script>
<script src="js/boot.js"></script>
</body>
</html>
