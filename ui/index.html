<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chess World Cup — Broadcast</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/tournament.css">
<link rel="stylesheet" href="css/watch.css">
<link rel="stylesheet" href="css/betting.css">
<link rel="stylesheet" href="css/analysis.css">
</head>
<body>

<!-- inline SVG icon sprite -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false">
  <symbol id="i-board" viewBox="0 0 24 24"><path fill="currentColor" d="M3 3h18v18H3V3Zm2 2v4h4V5H5Zm6 0v4h4V5h-4Zm6 0v4h2V5h-2ZM5 11v4h4v-4H5Zm6 0v4h4v-4h-4Zm6 0v4h2v-4h-2ZM5 17v2h4v-2H5Zm6 0v2h4v-2h-4Zm6 0v2h2v-2h-2Z"/></symbol>
  <symbol id="i-pulse" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" d="M2 12h4l2-6 4 12 2-6h8"/></symbol>
  <symbol id="i-chart" viewBox="0 0 24 24"><path fill="currentColor" d="M4 4h2v14h14v2H4V4Zm4 8h2v4H8v-4Zm4-4h2v8h-2V8Zm4 2h2v6h-2v-6Z"/></symbol>
  <symbol id="i-coin" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><path fill="currentColor" d="M11 7h2v1.1c1.2.2 2 .9 2 2h-2c0-.4-.4-.6-1-.6s-1 .3-1 .7c0 .4.5.6 1.4.9 1.3.4 2.6.9 2.6 2.5 0 1.2-.8 1.9-2 2.1V17h-2v-1.1c-1.3-.2-2.1-1-2.1-2.2h2c0 .5.5.8 1.1.8s1-.3 1-.7c0-.5-.6-.7-1.5-1-1.2-.4-2.4-.8-2.4-2.4 0-1.1.8-1.8 2-2V7Z"/></symbol>
  <symbol id="i-trophy" viewBox="0 0 24 24"><path fill="currentColor" d="M6 3h12v2h3v3a4 4 0 0 1-4 4h-.3A6 6 0 0 1 13 15.9V18h3v2H8v-2h3v-2.1A6 6 0 0 1 7.3 12H7a4 4 0 0 1-4-4V5h3V3Zm0 4H5v1a2 2 0 0 0 1 1.7V7Zm12 0v2.7A2 2 0 0 0 19 8V7h-1Z"/></symbol>
  <symbol id="i-play" viewBox="0 0 24 24"><path fill="currentColor" d="M8 5v14l11-7L8 5Z"/></symbol>
  <symbol id="i-pause" viewBox="0 0 24 24"><path fill="currentColor" d="M7 5h4v14H7V5Zm6 0h4v14h-4V5Z"/></symbol>
  <symbol id="i-step" viewBox="0 0 24 24"><path fill="currentColor" d="M5 5v14l9-7-9-7Zm11 0h3v14h-3V5Z"/></symbol>
  <symbol id="i-warning" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2 1 21h22L12 2Zm0 6 6.5 11h-13L12 8Zm-1 4h2v4h-2v-4Zm0 5h2v2h-2v-2Z"/></symbol>
  <symbol id="i-live-dot" viewBox="0 0 24 24"><circle cx="12" cy="12" r="6" fill="currentColor"/></symbol>
  <symbol id="i-close" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M6 6l12 12M18 6 6 18"/></symbol>
  <symbol id="i-flag-fallback" viewBox="0 0 24 24"><path fill="currentColor" d="M5 3h2v18H5V3Zm2 2h11l-2 4 2 4H7V5Z"/></symbol>
</svg>

<header class="app-header">
  <div class="brand">
    <svg class="logo" viewBox="0 0 24 24" aria-hidden="true"><use href="#i-trophy"></use></svg>
    <div>
      <h1>Chess World Cup</h1>
      <div class="tagline">measuring the <em>language tax</em> — Elo lost purely to implementation</div>
    </div>
  </div>

  <nav class="tablist" role="tablist" aria-label="Primary views">
    <button class="tab" role="tab" data-view="tournament" id="tab-tournament"
      aria-selected="false" aria-controls="view-tournament" tabindex="0">
      <svg class="ico" aria-hidden="true"><use href="#i-trophy"></use></svg>Tournament</button>
    <button class="tab" role="tab" data-view="watch" id="tab-watch"
      aria-selected="false" aria-controls="view-watch" tabindex="-1">
      <svg class="ico" aria-hidden="true"><use href="#i-board"></use></svg>Watch</button>
    <button class="tab" role="tab" data-view="betting" id="tab-betting"
      aria-selected="false" aria-controls="view-betting" tabindex="-1">
      <svg class="ico" aria-hidden="true"><use href="#i-coin"></use></svg>Betting</button>
    <button class="tab" role="tab" data-view="analysis" id="tab-analysis"
      aria-selected="false" aria-controls="view-analysis" tabindex="-1">
      <svg class="ico" aria-hidden="true"><use href="#i-chart"></use></svg>Analysis</button>
  </nav>

  <div class="header-right">
    <span class="chip mode--replay" id="mode-chip" role="status" aria-live="polite">◦ REPLAY</span>
    <span id="wallet-chip"><!-- owned by betting.js --></span>
  </div>
</header>

<main class="app-main">
  <section id="view-tournament" class="view" role="tabpanel" aria-labelledby="tab-tournament"></section>
  <section id="view-watch" class="view" role="tabpanel" aria-labelledby="tab-watch"></section>
  <section id="view-betting" class="view" role="tabpanel" aria-labelledby="tab-betting"></section>
  <section id="view-analysis" class="view" role="tabpanel" aria-labelledby="tab-analysis"></section>
</main>

<footer class="app-footer">
  <span>libchess · UCI over stdin/stdout · one game at a time · warm-up before the clock</span>
</footer>

<div id="toast-host"></div>

<script src="js/core.js"></script>
<script src="js/board.js"></script>
<script src="js/charts.js"></script>
<script src="js/betting.js"></script>
<script src="js/tournament.js"></script>
<script src="js/watch.js"></script>
<script src="js/analysis.js"></script>
<script src="js/boot.js"></script>
</body>
</html>
